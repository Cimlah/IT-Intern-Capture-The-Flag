services:
  hub:
    build: ./hub
    container_name: ctf-hub
    hostname: hub
    ports:
      - "${CTF_SSH_PORT:-2222}:22"
    networks:
      ctfnet:
        ipv4_address: 10.42.0.10
    environment:
      CTF_DNS_SERVER: "10.42.0.23"
      CTF_ALLOW_RESET: "${CTF_ALLOW_RESET:-0}"
    volumes:
      - ./secrets/hub.env:/etc/ctf/hub.env.src:ro
      - ./secrets/mentor.hash:/etc/ctf/mentor.hash.src:ro
      - state:/var/ctf/state
    depends_on:
      - task02-portscan
      - task05-ssh-hop
      - task06-dns
      - task07-logs
      - task08-api
      - task09-crypto
      - task10-final

  task02-portscan:
    build: ./tasks/task02-portscan
    container_name: mercury
    hostname: mercury
    env_file: ./secrets/task02.env
    networks:
      ctfnet:
        ipv4_address: 10.42.0.20

  task05-ssh-hop:
    build: ./tasks/task05-ssh-hop
    container_name: mars-hop
    hostname: mars-hop
    env_file: ./secrets/task05.env
    networks:
      ctfnet:
        ipv4_address: 10.42.0.22

  task06-dns:
    build: ./tasks/task06-dns
    container_name: venus
    hostname: venus
    env_file: ./secrets/task06.env
    networks:
      ctfnet:
        ipv4_address: 10.42.0.23

  task07-logs:
    build: ./tasks/task07-logs
    container_name: earth-logs
    hostname: earth-logs
    env_file: ./secrets/task07.env
    networks:
      ctfnet:
        ipv4_address: 10.42.0.24

  task08-api:
    build: ./tasks/task08-api
    container_name: jupiter-api
    hostname: jupiter-api
    env_file: ./secrets/task08.env
    networks:
      ctfnet:
        ipv4_address: 10.42.0.25

  task09-crypto:
    build: ./tasks/task09-crypto
    container_name: saturn-crypto
    hostname: saturn-crypto
    env_file: ./secrets/task09.env
    networks:
      ctfnet:
        ipv4_address: 10.42.0.26

  task10-final:
    build: ./tasks/task10-final
    container_name: neptune-final
    hostname: neptune-final
    env_file: ./secrets/task10.env
    networks:
      ctfnet:
        ipv4_address: 10.42.0.27

  # Decoy containers are defined in docker-compose.override.yml, which is
  # regenerated by scripts/generate-flags.sh on every spin-up with a random
  # subset of names. See the override file for the per-instance decoy set.

networks:
  ctfnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.42.0.0/24

volumes:
  state:
